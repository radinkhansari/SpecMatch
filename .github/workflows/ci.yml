name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Schema freeze check
        run: |
          echo "$(cat .github/schema.sha256)  backend/app/models/schemas.py" | sha256sum --check -

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run lint
        run: ruff check .

      - name: Run tests
        working-directory: backend
        run: pytest

      - name: Build Docker image
        run: docker build -f backend/Dockerfile .
